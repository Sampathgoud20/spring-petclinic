apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  selector:
    replicas: 6
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: 612070058498.dkr.ecr.ap-south-1.amazonaws.com/dev/java:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: myapp
spec:
  selector:
    app: myapp
  ports:
  - port: 80
    targetPort: 80
